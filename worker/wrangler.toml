# ============================================================================
# Ultimate Edge Shield — Cloudflare Worker Configuration
# Enterprise-Grade Zero-Trust Bot Protection System
# ============================================================================

name = "verifysky-edge-staging"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
account_id = "5097201ac658e8d27ac706118005116e"
workers_dev = false

# ---------------------------------------------------------------------------
# Route Configuration
# IMPORTANT:
# Routes are managed from the dashboard (Cloudflare API), not from Wrangler.
# Keeping routes out of this file prevents deploy from overriding domain routes.
# ---------------------------------------------------------------------------

# ---------------------------------------------------------------------------
# D1 Database Binding
# Stores challenges, device fingerprints, and security event logs.
# Create with: wrangler d1 create EDGE_SHIELD_DB
# ---------------------------------------------------------------------------
[[d1_databases]]
binding = "DB"
database_name = "VERIFY_SKY_STAGING_DB"
database_id = "d923830f-391f-4c6a-a919-dd3552e9bccd"

# ---------------------------------------------------------------------------
# KV Namespace Binding
# Sub-millisecond session validation and one-time nonce consumption.
# Create with: wrangler kv:namespace create SESSION_KV
# ---------------------------------------------------------------------------
[[kv_namespaces]]
binding = "SESSION_KV"
id = "c8105e6570f24c58bbe137b10b1c0b82"

# ---------------------------------------------------------------------------
# Environment Variables (Secrets) — GLOBAL ONLY
# Set via: wrangler secret put <KEY_NAME>
# Bootstrap via: node scripts/init-globals.mjs
#
# Required global secrets (shared across all tenants):
#   JWT_SECRET          — HMAC-SHA256 signing key for Human Session Tokens
#   CF_API_TOKEN        — Cloudflare API token (WAF write + Turnstile manage)
#   OPENROUTER_API_KEY  — OpenRouter API key for AI-driven threat analysis
#
# Domain-specific settings (Turnstile keys, Zone IDs) are stored in the
# D1 `domain_configs` table and provisioned via:
#   node scripts/onboard-domain.mjs <domain>
# ---------------------------------------------------------------------------

# ---------------------------------------------------------------------------
# Build Configuration
# ---------------------------------------------------------------------------
# Build: Wrangler bundles TypeScript natively via esbuild (no custom build needed)


# ---------------------------------------------------------------------------
# Development Settings
# ---------------------------------------------------------------------------
[dev]
port = 8787
local_protocol = "http"

# ---------------------------------------------------------------------------
# Global Variables
# ---------------------------------------------------------------------------
[vars]
OPENROUTER_MODEL = "z-ai/glm-4.5-air:free"
OPENROUTER_FALLBACK_MODELS = "openai/gpt-4o-mini"
ES_TEST_MODE = "off"
ES_DISABLE_WAF_AUTODEPLOY = "on"
ES_TURNSTILE_STRICT = "off"
ES_STRICT_CONTEXT_BINDING = "off"
